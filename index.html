<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кешірші мені... ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="main-content" class="container">
        <div class="glass-card">
            <img id="mainSticker" src="https://media.tenor.com/n1EblbbMdbYAAAAm/bubu-dudu-sleep-dudu-bubu-love.webp" alt="Sticker">
            <h1 id="title">Кешірші мені... , сенің маған ренжіп жүргеніңді қаламаймын 🥰</h1>
            
            <div id="initial-buttons" class="button-container">
                <button id="yesBtn" class="btn">Иә</button>
                <button id="noBtn" class="btn btn-red">Жоқ</button>
            </div>

            <div id="feedback-block" class="hidden">
                <div class="kiss-action">
                    <button id="kissBtn" class="btn btn-kiss">Сүю 💋</button>
                </div>
                <div class="letter-section">
                    <textarea id="userMessage" placeholder="Маған бірдеңе жазшы ... ✨"></textarea>
                    <button id="sendLetterBtn" class="btn btn-send">Хатты жіберу 💌</button>
                </div>
            </div>
        </div>
    </div>
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>
</body>
</html>
